apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: deploy-nomulus
description: deploy-nomulus is a Cloud native replacement for Spinnaker that enables
  gradual rollouts and SLA-based canary analysis for Nomulus.
serialPipeline:
  stages:
  - targetId: crash
    strategy:
      canary:
        customCanaryDeployment:
          phaseConfigs:
          - phaseId: "canary-1"
            profiles: ["crash-partial-phase-1"]
            percentage: 10
            analysis:
              # 10 minutes.
              duration: 600s
              googleCloud:
                alertPolicyChecks:
                    partialDeploymentAlertPolicyChecks
          - phaseId: "canary-5"
            profiles: ["crash-partial-phase-5"]
            percentage: 50
            analysis:
              # 10 minutes.
              duration: 600s
              googleCloud:
                alertPolicyChecks:
                    partialDeploymentAlertPolicyChecks
          - phaseId: "stable"
            profiles: ["crash"]
            percentage: 100
            analysis:
              # 10 minutes.
              duration: 600s
              googleCloud:
                alertPolicyChecks:
                    stableDeploymentAlertPolicyChecks
